  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tournament Leaderboard</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    overflow:hidden;
}

.wrapper{
    width:100%;
    padding:20px;
}

.board{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.column{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.row{
    display:grid;
    grid-template-columns:70px 1fr 120px;

    column-gap:30px;

    align-items:center;

    padding:0 18px 0 0;

    background:rgba(20,20,20,0.985);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(8px);

    transition:0.2s;

    position:relative;
    overflow:hidden;
}

.row:hover{
    transform:scale(1.01);
}

.qualified{

    border:1px solid rgba(76,175,80,0.35);

    background:
        linear-gradient(
            180deg,
            rgba(46,125,50,0.88) 0%,
            rgba(20,20,20,0.985) 24%
        );

    box-shadow:
        0 0 18px rgba(76,175,80,0.10);
}

.qualified .rank-section{



    border-right:
        1px solid rgba(255,255,255,0.12);
}

.rank{
    font-size:28px;
    font-weight:900;
    color:white;
}

.rank-section{

    align-self:stretch;

    display:flex;
    align-items:center;
    justify-content:center;

    min-width:90px;

    padding:0 18px;

    border-right:1px solid rgba(255,255,255,0.08);

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.08),
            rgba(255,255,255,0.02)
        );
}

.player{
    font-size:22px;
    font-weight:700;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.points{
    text-align:right;

    font-size:24px;
    font-weight:900;

    color:#ffd54a;
}

.stats{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
}

.stats{
    padding:14px 0;
}

.points{
    text-align:right;
    font-size:26px;
    font-weight:900;
    color:#ffd54a;
    line-height:1;
}

.kills , .maps{
    margin-top:4px;

    font-size:12px;
    font-weight:700;

    color:rgba(255,255,255,0.7);

    letter-spacing:1px;
}

.team-info{
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.players{

    margin-top:4px;

    font-size:12px;

    color:rgba(255,255,255,0.62);

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.title{

    margin-bottom:18px;

    font-size:54px;

    font-weight:900;

    letter-spacing:4px;

    color:white;

    text-transform:uppercase;

    text-shadow:
        0 0 18px rgba(255,255,255,0.12);
}

</style>

</head>
<body>

<div class="wrapper">

    <div class="title">
        STANDINGS
    </div>
    <div class="board">

        <div class="column" id="left-column"></div>

        <div class="column" id="right-column"></div>

    </div>

</div>

<script>
let map_count=0;
const teamNames = [
    {"id": "e5d767f3-9988-4c45-a583-8303cbf7d0e6",
    "name": "RVX"},
    {"id": "2cd6309a-a559-4be3-8bde-fab88c168dc5",
    "name": "Castillo"},
    {"id": "0ec2d333-24f2-4a3e-9bc1-40c3a50c7f50",
    "name": "Aldosmn"},
    {"id": "741bd254-dacd-447f-8b07-daae1c844999",
    "name": "Woodzzii"},
    {"id": "da3d32f0-2745-47f7-8663-af188435d273",
    "name": "MirreyTv"},
    {"id": "0cc1a27a-946c-4589-bed5-e8e35f264994",
    "name": "Sirvega"},
    {"id": "876406fd-a779-4fb1-830a-fc23207d47fb",
    "name": "iBGod"},
    {"id": "40a60670-5bc0-4ff7-ad71-e81d7b2d48e8",
    "name": "Smoky"},
    {"id": "d8dd7adf-254b-4d66-a3da-b6a2c111cd13",
    "name": "iCuevas"},
    {"id": "b6d94cec-6d88-42c1-b011-e90c2e0b32d7",
    "name": "Tekillerr"},
    {"id": "f00e580e-0449-4908-9b9f-e4ddbd4b56d9",
    "name": "BSK Spidys"},
    {"id": "d13a2712-325a-411a-a3b8-30ff3701e486",
    "name": "Clamp"},
    {"id": "5c4f1945-5860-44ce-a20f-4972477a2e3f",
    "name": "1x-1x"},
    {"id": "98b27202-2e33-4a38-8b4f-f61b307e5d6a",
    "name": "Kryziito"},
    {"id": "59ab5b06-9bab-4a0f-8bfd-2088b32281c5",
    "name": "CherryVvs"},
    {"id": "0cbbd359-7516-4768-b303-82a10d2fc1d2",
    "name": "Jooy_booy"}
    ];

const teamMap = Object.fromEntries(
    teamNames.map(team => [team.id, team.name])
);

async function loadLeaderboard() {

    const url =
        "https://cod-livestandings-agg.ialexk.workers.dev";

    const response = await fetch(url);

    const json = await response.json();

    map_count = json.map_count

    const leaderboard = json.standings
        .map((team, index) => ({

            rank: team.rank,

            maps: map_count,

            team: teamMap[team.team_name] || team.players[0].name,

            points: team.final_score,

            kills: team.total_kills,

            players: team.players   
                ?.map(player => player.name)
                .join(" • ")

        }))

        .sort((a,b) => a.rank - b.rank)

        .slice(0,16);

    renderLeaderboard(leaderboard);
}

function createRow(team, index){

    const qualified = index < 3;

    return `
        <div class="row ${qualified ? 'qualified' : ''}">

            <div class="rank-section">
                <div class="rank">
                    #${index + 1}
                </div>
            </div>

            <div class="team-info">

                <div class="player">
                    ${team.team}
                </div>

                <div class="players">
                    ${team.players || ""}
                </div>

            </div>

            <div class="stats">

                <div class="points">
                    ${Number(team.points).toFixed(2)}
                </div>

                <div class="kills">
                    ${team.kills} KILLS
                </div>
                <div class="maps">
                    ${team.maps} maps
                </div>
            </div>

        </div>
    `;
}

function renderLeaderboard(data){

    const leftColumn = document.getElementById("left-column");
    const rightColumn = document.getElementById("right-column");

    document.querySelector(".title").innerHTML =
    `STANDINGS • MAP ${map_count}`;

    const leftSide = data.slice(0,8);

    const rightSide = data.slice(8,16);

    leftColumn.innerHTML =
        leftSide.map((team, index) => createRow(team, index)).join("");

    rightColumn.innerHTML =
        rightSide.map((team, index) => createRow(team, index + 8)).join("");
}

// primera carga
loadLeaderboard();

// refresh automático cada 60 segundos
setInterval(loadLeaderboard, 15000);

</script>

</body>
</html>
