<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Utilities Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Arial;
      background: #0f172a;
      color: white;
    }

    /* HEADER */
    .header {
      padding: 20px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      padding: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* CARD */
    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 20px;
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    /* ICON */
    .icon {
      font-size: 28px;
    }

    /* TITLE */
    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* DESCRIPTION */
    .desc {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .header {
        font-size: 1.3rem;
      }

      .card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="header">🚀 Dashboard</div>

  <div class="grid">

    <a class="card" href="leaderboard.html">
      <div class="icon">📊</div>
      <div class="title">Leaderboard</div>
      <div class="desc">Players & prize pool.</div>
    </a>
    
    <a class="card" href="ticker-tournament.html">
      <div class="icon">📊</div>
      <div class="title">OBS Topurnament Ticker</div>
      <div class="desc">Standings Scroll from spreadsheet.</div>
    </a>

    <a class="card" href="tournament.html">
      <div class="icon">📊</div>
      <div class="title">OBS Topurnament Table</div>
      <div class="desc">Standings Table from spreadsheet.</div>
    </a>

    <a class="card" href="ticker-standings.html">
      <div class="icon">📊</div>
      <div class="title">OBS Standings Ticker</div>
      <div class="desc">From Live Feed.</div>
    </a>

    <a class="card" href="standings.html">
      <div class="icon">📊</div>
      <div class="title">OBS Standings Table</div>
      <div class="desc">From Live Feed.</div>
    </a>
    
  </div>

</body>
</html>
