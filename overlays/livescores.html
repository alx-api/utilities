<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tournament Leaderboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg-main:#090d15;
    --bg-panel:#121826;
    --bg-panel-2:#1b2435;

    --gold:#f6c453;
    --gold-soft:#d9a63f;

    --purple:#8d4dff;
    --purple-glow:rgba(141,77,255,.35);

    --wine:#6e1d32;

    --blue:#355c9a;

    --text-main:#f4f6fb;
    --text-soft:rgba(255,255,255,.72);
    --text-dim:rgba(255,255,255,.44);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:
    radial-gradient(
        circle at top left,
        rgba(141,77,255,.22),
        transparent 34%
    ),

    radial-gradient(
        circle at bottom right,
        rgba(177,47,69,.18),
        transparent 28%
    ),

    linear-gradient(
        180deg,
        #121826 0%,
        #090d15 100%
    );

    font-family:'Oxanium', sans-serif;

    color:var(--text-main);

    overflow:hidden;

    position:relative;
}

body::before{
    content:"";

    position:fixed;
    inset:0;

    background-image:
    linear-gradient(
        rgba(255,255,255,.012) 1px,
        transparent 1px
    );

    background-size:100% 3px;

    opacity:.35;

    pointer-events:none;
}

.wrapper{
    width:100%;
    padding:18px;
}

.title{
    margin-bottom:18px;

    display:flex;
    align-items:center;
    gap:14px;

    font-size:50px;
    font-weight:800;

    letter-spacing:4px;

    text-transform:uppercase;

    color:white;

    text-shadow:
    0 0 24px rgba(141,77,255,.22);
}

.title::before{
    content:"";

    width:10px;
    height:42px;

    border-radius:999px;

    background:
    linear-gradient(
        180deg,
        var(--purple),
        var(--gold)
    );

    box-shadow:
    0 0 18px rgba(141,77,255,.55);
}

.board{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.column{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.row{
    position:relative;

    display:grid;

    grid-template-columns:
    58px
    minmax(0,1fr)
    92px;

    gap:14px;

    align-items:center;

    min-height:72px;

    overflow:hidden;

    background:
    linear-gradient(
        180deg,
        rgba(27,36,53,.96) 0%,
        rgba(10,13,20,.98) 100%
    );

    box-shadow:
    0 6px 24px rgba(0,0,0,.42),
    inset 0 1px 0 rgba(255,255,255,.03);

    transition:
    transform .18s ease,
    box-shadow .18s ease;
}

.row::before{
    content:"";

    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:2px;

    background:
    linear-gradient(
        90deg,
        var(--purple),
        var(--gold)
    );

    opacity:.8;
}

.row:hover{
    transform:translateY(-1px);

    box-shadow:
    0 12px 30px rgba(0,0,0,.5);
}

.qualified{
    background:
    linear-gradient(
        90deg,
        rgba(246,196,83,.14),
        rgba(18,24,38,.98) 20%
    );

    box-shadow:
    0 0 22px rgba(246,196,83,.08),
    0 6px 24px rgba(0,0,0,.45);
}

.rank-section{
    align-self:stretch;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
        180deg,
        rgba(141,77,255,.18),
        rgba(141,77,255,.04)
    );

    border-right:
    1px solid rgba(255,255,255,.03);
}

.rank{
    font-size:28px;
    font-weight:900;

    letter-spacing:-1px;

    color:white;

    text-shadow:
    0 0 16px rgba(141,77,255,.3);
}

.team-info{
    min-width:0;

    display:flex;
    flex-direction:column;

    overflow:hidden;
}

.player{
    font-size:20px;
    font-weight:800;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

    letter-spacing:.4px;
}

.players{
    margin-top:3px;

    color:var(--text-dim);

    font-size:11px;

    text-transform:uppercase;

    letter-spacing:.9px;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.stats{
    padding-right:12px;

    display:flex;
    flex-direction:column;
    align-items:flex-end;
    justify-content:center;
}

.points{
    color:var(--gold);

    font-size:28px;
    font-weight:900;

    line-height:1;

    text-shadow:
    0 0 14px rgba(246,196,83,.24);
}

.kills,
.maps{
    margin-top:3px;

    font-size:11px;
    font-weight:700;

    letter-spacing:1px;

    color:var(--text-soft);
}

</style>

</head>
<body>

<div class="wrapper">

    <div class="title">
        STANDINGS
    </div>

    <div class="board">

        <div class="column" id="left-column"></div>

        <div class="column" id="right-column"></div>

    </div>

</div>

<script>
let map_count=0;

async function loadLeaderboard() {

    const url =
        "https://json-live-merge.ialexk.workers.dev/";

    const response = await fetch(url);

    const json = await response.json();

    map_count = json.map_count;

    const leaderboard = json.standings
        .map((team) => ({

            rank: team.rank,

            maps: map_count,

            team: team.team_name,

            points: team.final_score,

            kills: team.total_kills,

            players: team.players
                ?.map(player => player.name)
                .join(" • ")

        }))

        .sort((a,b) => a.rank - b.rank)

        .slice(0,16);

    renderLeaderboard(leaderboard);
}

function createRow(team, index){

    const qualified = index < 3;

    return `
        <div class="row ${qualified ? 'qualified' : ''}">

            <div class="rank-section">
                <div class="rank">
                    #${index + 1}
                </div>
            </div>

            <div class="team-info">

                <div class="player">
                    ${team.team}
                </div>

                <div class="players">
                    ${team.players || ""}
                </div>

            </div>

            <div class="stats">

                <div class="points">
                    ${Number(team.points).toFixed(2)}
                </div>

                <div class="kills">
                    ${team.kills} KILLS
                </div>

                <div class="maps">
                    MAP ${team.maps}
                </div>

            </div>

        </div>
    `;
}

function renderLeaderboard(data){

    const leftColumn = document.getElementById("left-column");
    const rightColumn = document.getElementById("right-column");

    document.querySelector(".title").innerHTML =
    `STANDINGS • MAP ${map_count}`;

    const leftSide = data.slice(0,8);

    const rightSide = data.slice(8,16);

    leftColumn.innerHTML =
        leftSide.map((team, index) => createRow(team, index)).join("");

    rightColumn.innerHTML =
        rightSide.map((team, index) => createRow(team, index + 8)).join("");
}

loadLeaderboard();

setInterval(loadLeaderboard, 15000);

</script>

</body>
</html>
