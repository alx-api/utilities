  <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Leaderboard</title>
  <style>
* {
  box-sizing: border-box;
}
html {
  font-size: 2rem; /* base */
}
/* BODY */
body {
  font-family: system-ui, -apple-system, Arial;
  margin: 0;
  background: hsl(240 7% 8%);
  color: hsl(0 0% 98%);
  font-size: 1rem;
}

/* CONTENEDOR PRINCIPAL */
.container {
  max-width: 900px;
  margin: 0 auto;     /* centra horizontalmente */
  padding: 12px;
}

.search-box,
.card,
.table-container,
button.copy {
  margin-bottom: 12px;
}

/* TITULOS */
h2 {
  margin: 20px 0 10px;
  font-size: 1.2rem;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  position: sticky;
  top: 0;
  background: #0f172a;
  z-index: 10;
  border-bottom: 1px solid #1e293b;
}

.app-header .title {
  font-weight: 600;
  font-size: 1.1rem;
}

.card {
  background: #1e293b;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.meta-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  margin-bottom: 6px;
}
    
.pos {
  font-size: 1.2rem;
}

.creator {
  font-weight: 600;
}

.points {
  font-size: 1rem;
}

.prize {
  font-size: 1rem;
}
    
/* BOTONES */
button {
  min-height: 44px; /* estándar iOS/Android */
  padding: 12px 16px;
  font-size: 0.95rem;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button.back {
  background: #374151;
  color: white;
  margin-bottom: 10px;
}

.icon-btn {
  width: 44px;
  height: 44px;
  padding: 0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1e293b;
}

button.copy {
  width: 100%;
  margin: 10px 0;
}

.search-box {
  display: flex;
  gap: 8px;
  padding: 10px;
}

.search-box input {
  flex: 1;
  height: 44px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 1rem;
}

.search-box button {
  min-width: 80px;
  width: auto;
  padding: 12px 16px;
  border-radius: 10px;
}
   
/* CONTENEDOR SCROLL */
.table-container {
  overflow-x: auto;
  margin-bottom: 20px;
}

/* TABLAS */
table {
  border-collapse: collapse;
  width: 100%;
  min-width: 320px;
  /*background: hsl(240deg 80% 10% / 50%);*/
  background-color: #3b82f61a;
  border-radius: 10px;
  overflow: hidden;
}

/* HEADERS */
th {
  background: #111827;
  color: white;
  font-size: 0.85rem;
  padding: 10px;
}

/* CELDAS */
td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  font-size: 0.95rem;
}

/* INPUTS */
input {
  width: 100%;
  padding: 8px;
  border: 1px solid #3b82f633;
  background-color: hsl(240deg 20% 20% / 50%);
  border-radius: 6px;
  font-size: 1rem;
  color: hsl(var(--foreground));
  text-align: left;
}

/* HEADER */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111827;
  color: white;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

/* CONTENIDO */
.section-content {
  overflow: hidden;
  transition: all 0.3s ease;
}

/* COLAPSADO */
.section-content.collapsed {
  max-height: 0;
  padding: 0;
  opacity: 0;
}

/* EXPANDIDO */
.section-content:not(.collapsed) {
  max-height: 70vh;
  overflow-y: auto;
  margin-top: 10px;
  opacity: 1;
}

/* FLECHA */
.arrow {
  transition: transform 0.3s;
}

.section-header.active .arrow {
  transform: rotate(180deg);
}

.inidate, .enddate {
  font-size: 0.65rem;
  text-align: center;
}

/* RESUMEN DESTACADO */
#summary td {
  font-weight: 600;
}
@media (min-width: 768px) {
  table {
    max-width: 100%;
  }
}

/* 📱 MOBILE MODE (tipo cards) */
@media (max-width: 480px) {

  table, thead, tbody, tr, td {
    display: block;
    width: 100%;
  }

  thead {
    display: none;
  }

  tr {
    background: #1e293b;
    margin-bottom: 12px;
    border-radius: 12px;
    padding: 12px;
  }

  td {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.95rem;
  }

  td::before {
    font-weight: 500;
    color: #94a3b8;
  }

  td:nth-child(1)::before { content: "#"; }
  td:nth-child(2)::before { content: "Jugador"; }
  td:nth-child(3)::before { content: "Puntos"; }
  td:nth-child(4)::before { content: "Premio"; }
}
  </style>
</head>
<body>
<div class="container">

<div class="app-header">
  <button class="icon-btn" onclick="goBack()">⬅</button>
  <div class="title">Leaderboard</div>
</div>

<div class="search-box">
  <input id="refInput" placeholder="Referral code..." />
  <button onclick="loadByRef()">Load</button>
</div>
<button class="copy" onclick="copyPlayers()">Copiar jugadores</button>
<div class="table-container">
  <div id="metadataCard" class="card"></div>
</div>
<div class="table-container">
    <table id="summary">
      <thead>
          <tr><th>#</th><th>Jugador</th><th>Puntos</th><th>Premio</th></tr>
      </thead>
      <tbody></tbody>
    </table>
</div>
<script>

function goBack() {
  window.history.back();
}

function loadByRef() {
 const ref = document.getElementById("refInput").value.trim();

 if (!ref) return;

 // actualiza URL sin recargar completamente
 const url = new URL(window.location);
 url.searchParams.set("ref", ref);
 window.history.pushState({}, "", url);

 // dispara flujo
 initLeaderboard(ref);
}
 
function copyPlayers() {
  const rows = document.querySelectorAll("#summary tbody tr");
  const btn = document.querySelector("button[onclick='copyPlayers()']");

  const players = [];

  rows.forEach(tr => {
    const name = tr.querySelector("td:nth-child(2)").textContent.trim();
    const rank = tr.querySelector("td:nth-child(1)").textContent.trim();
    if (name) players.push(`${rank}. ${name}`);
  });

  const text = players.join("\n");

  navigator.clipboard.writeText(text)
    .then(() => {
      btn.textContent = "Copiado ✅";
      setTimeout(() => {
        btn.textContent = "Copiar jugadores";
      }, 1500);
    })
    .catch(err => {
      console.error("Error al copiar:", err);
    });
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString("es-MX", {
    timeZone: "UTC",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function fetchMetaDataFromAPI(ref) {

  try {
    const response = await fetch(`https://admin.yeeterboards.com/api/leaderboards/${ref}`, {
      headers: {
        "origin": "https://yeeterboards.com",
        "referer": "https://yeeterboards.com/",
        "sec-fetch-mode": "cors",
        "sec-fetch-site": "same-site",
        "Authorization": "Bearer TjYOkv6tc2ODXkKcJUmIXjAAVqoHotzPV6sK4c5j2nD9h4rZuac6lbznSLuPYvgM"
      }
    });

    if (!response.ok) throw new Error("API error");

    const data = await response.json();

    return {
      referral: data.referral_code,
      prize: data.prize_amount,
      inidate: data.calculated_start,
      enddate: data.calculated_end,
      yeet_api_key: data.yeet_api_key,
      prize_array: data.prize_array,
      current_volume: Number(data.total_volume_timed) || 0,
      total_volume: Number(data.total_volume_all_time) || 0
    };

  } catch (error) {
    console.warn("⚠️ API MetaData falló, usando datos locales", error);
    return null;
  }
}

async function fetchFromAPI(apiKey,inidate,enddate) {
  try {
    
    const response = await fetch(`https://admin.yeeterboards.com/api/yeet/concierge/public/affiliate/referrals/all?startDate=${inidate}&endDate=${enddate}`, {
      headers: {
        "origin": "https://yeeterboards.com",
        "referer": "https://yeeterboards.com/",
        "sec-fetch-mode": "cors",
        "sec-fetch-site": "same-site",
        "x-yeet-api-key": apiKey
      }
    });

    if (!response.ok) throw new Error("API error");

    const data = await response.json();

    return data.map(p => ({
      jugador: p.username,
      puntos: Number(p.leaderboardPoints) || 0
    }));

  } catch (error) {
    console.warn("⚠️ API falló, usando datos locales", error);
    return null;
  }
}

function loadMetaData(tableId,inidate,enddate,referral,prize,current_volume) {

  const div = document.getElementById("metadataCard");

  div.innerHTML = `
    <div class="meta-row"><span>Referral</span><strong>${referral}</strong></div>
    <div class="meta-row"><span>Inicio</span><strong>${formatDate(inidate)}</strong></div>
    <div class="meta-row"><span>Fin</span><strong>${formatDate(enddate)}</strong></div>
    <div class="meta-row"><span>Premio</span><strong>$${prize.toLocaleString()}</strong></div>
  `;

}

function loadInitialData(tableId, data, prizes) {

  data.sort((a,b) => b.puntos  - a.puntos);

  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.innerHTML = "";

  data.forEach((row,index) => {
    const prize = prizes[index] ?? 0;
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="pos">${index + 1}</td>
      <td class="creator">${row.jugador}</td>
      <td class="points">${row.puntos.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
            })}</td>
      <td class="prize">$${prize.toLocaleString()}</td>
    `;

    tbody.appendChild(tr);
  });
}

async function initLeaderboard(refParam) {
  let ref = refParam;
  let apiKey, inidate,enddate,prizes;

  if (!ref) {
    const params = new URLSearchParams(window.location.search);
    ref = params.get("ref");
  }

  document.getElementById("refInput").value = ref;

  if (!ref) {
    console.warn("No hay referral code");
    return;
  }
  const apiMetaData = await fetchMetaDataFromAPI(ref);

  if (apiMetaData) {
    apiKey = apiMetaData.yeet_api_key;
    inidate = apiMetaData.inidate;
    enddate = apiMetaData.enddate;
    prizes = apiMetaData.prize_array;
    referral = 
    loadMetaData("metadata", inidate,enddate,apiMetaData.referral,apiMetaData.prize,apiMetaData.current_volume);
  } else {
    apiKey = sessionStorage.getItem("yeet_api_key");
    inidate = sessionStorage.getItem("yeet_api_inidate");
    enddate = sessionStorage.getItem("yeet_api_enddate");
    prizes = [];
  }

  const apiData = await fetchFromAPI(apiKey,inidate,enddate);

  if (apiData && apiData.length) {
    loadInitialData("summary", apiData, prizes);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  initLeaderboard();
});

document.getElementById("refInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    loadByRef();
  }
});

sessionStorage.removeItem("yeet_api_key");
sessionStorage.removeItem("yeet_api_inidate");
sessionStorage.removeItem("yeet_api_enddate");

</script>
</div>
</body>
</html>
