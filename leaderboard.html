 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Leaderboard</title>
  <style>
* {
  box-sizing: border-box;
}
html {
  font-size: 2rem; /* base */
}
/* BODY */
body {
  font-family: system-ui, -apple-system, Arial;
  margin: 0;
  background: hsl(240 7% 8%);
  color: hsl(0 0% 98%);
  font-size: 1rem;
}

/* CONTENEDOR PRINCIPAL */
.container {
  max-width: 900px;
  margin: 0 auto;     /* centra horizontalmente */
  padding: 10px;
}

/* TITULOS */
h2 {
  margin: 20px 0 10px;
  font-size: 1.2rem;
}

/* BOTONES */
button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button.back {
  background: #374151;
  color: white;
  margin-bottom: 10px;
}

/* CONTENEDOR SCROLL */
.table-container {
  overflow-x: auto;
  margin-bottom: 20px;
}

/* TABLAS */
table {
  border-collapse: collapse;
  width: 100%;
  min-width: 320px;
  /*background: hsl(240deg 80% 10% / 50%);*/
  background-color: #3b82f61a;
  border-radius: 10px;
  overflow: hidden;
}

/* HEADERS */
th {
  background: #111827;
  color: white;
  font-size: 0.85rem;
  padding: 10px;
}

/* CELDAS */
td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  font-size: 0.95rem;
}

/* INPUTS */
input {
  width: 100%;
  padding: 8px;
  border: 1px solid #3b82f633;
  background-color: hsl(240deg 20% 20% / 50%);
  border-radius: 6px;
  font-size: 1rem;
  color: hsl(var(--foreground));
  text-align: right;
}

/* HEADER */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111827;
  color: white;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

/* CONTENIDO */
.section-content {
  overflow: hidden;
  transition: all 0.3s ease;
}

/* COLAPSADO */
.section-content.collapsed {
  max-height: 0;
  padding: 0;
  opacity: 0;
}

/* EXPANDIDO */
.section-content:not(.collapsed) {
  max-height: 70vh;
  overflow-y: auto;
  margin-top: 10px;
  opacity: 1;
}

/* FLECHA */
.arrow {
  transition: transform 0.3s;
}

.section-header.active .arrow {
  transform: rotate(180deg);
}

.pos {
  font-weight: bold;
  text-align: right;
}
/* PUNTOS */
.points {
  font-weight: bold;
  color: hsl(311 67% 54%);
  text-align: right;
}
.prize {
  font-weight: bold;
  color: rgb(34 197 94);
  text-align: right;
}
.inidate, .enddate {
  font-size: 0.65rem;
  text-align: center;
}

/* RESUMEN DESTACADO */
#summary td {
  font-weight: 600;
}
@media (min-width: 768px) {
  table {
    max-width: 100%;
  }
}

/* 📱 MOBILE MODE (tipo cards) */
@media (max-width: 480px) {
  body {
      font-size: 1.05rem;
  }

  h2 {
    font-size: 1.3rem;
  }

  input {
    font-size: 16px;
    padding: 10px;
  }

  button {
    font-size: 1rem;
    padding: 12px;
  }

  table, thead, tbody, tr, td, th {
    display: block;
    width: 100%;
    font-size: 1rem;
  }

  thead {
    display: none;
  }

  tr {
    background: white;
    margin-bottom: 10px;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 2px 6px rgba(41, 63, 122, 0.61);
  }

  td {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border: none;
  }

  td::before {
    font-weight: bold;
    color: #555;
  }

  /* Labels dinámicos */
    td:nth-child(1)::before { content: "#"; }
    td:nth-child(2)::before { content: "Jugador"; }
    td:nth-child(3)::before { content: "Volumen"; }
    td:nth-child(4)::before { content: "Puntos"; }

}
  </style>
</head>
<body>
<div class="container">

<h2>Leaderboard</h2>
<button class="back" onclick="goBack()">⬅ Volver</button>
<button onclick="copyPlayers()">Copiar jugadores</button>
<div class="table-container">
    <table id="metadata">
      <thead>
          <tr><th>Referral</th><th>Ini Date</th><th>End Date</th><th>Prize Pool</th></tr>
      </thead>
      <tbody></tbody>
    </table>
</div>
<div class="table-container">
    <table id="summary">
      <thead>
          <tr><th>#</th><th>Jugador</th><th>Puntos</th><th>Premio</th></tr>
      </thead>
      <tbody></tbody>
    </table>
</div>
<script>

function goBack() {
  window.history.back();
}

function toggleSection(header) {
  const content = header.nextElementSibling;

  content.classList.toggle("collapsed");
  header.classList.toggle("active");
}

function copyPlayers() {
  const rows = document.querySelectorAll("#summary tbody tr");
  const btn = document.querySelector("button[onclick='copyPlayers()']");

  const players = [];

  rows.forEach(tr => {
    const name = tr.querySelector("td:nth-child(2)").textContent.trim();
    const rank = tr.querySelector("td:nth-child(1)").textContent.trim();
    if (name) players.push(`${rank}. ${name}`);
  });

  const text = players.join("\n");

  navigator.clipboard.writeText(text)
    .then(() => {
      btn.textContent = "Copiado ✅";
      setTimeout(() => {
        btn.textContent = "Copiar jugadores";
      }, 1500);
    })
    .catch(err => {
      console.error("Error al copiar:", err);
    });
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString("es-MX", {
    timeZone: "UTC",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function fetchMetaDataFromAPI() {
  const params = new URLSearchParams(window.location.search);
  try {
    const response = await fetch(`https://admin.yeeterboards.com/api/leaderboards/${params.get("aff")}`, {
      headers: {
        "origin": "https://yeeterboards.com",
        "referer": "https://yeeterboards.com/",
        "sec-fetch-mode": "cors",
        "sec-fetch-site": "same-site",
        "Authorization": "Bearer TjYOkv6tc2ODXkKcJUmIXjAAVqoHotzPV6sK4c5j2nD9h4rZuac6lbznSLuPYvgM"
      }
    });

    if (!response.ok) throw new Error("API error");

    const data = await response.json();

    return {
      referral: data.referral_code,
      prize: data.prize_amount,
      inidate: data.calculated_start,
      enddate: data.calculated_end,
      yeet_api_key: data.yeet_api_key,
      prize_array: data.prize_array,
      current_volume: Number(data.total_volume_timed) || 0,
      total_volume: Number(data.total_volume_all_time) || 0
    };

  } catch (error) {
    console.warn("⚠️ API MetaData falló, usando datos locales", error);
    return null;
  }
}

async function fetchFromAPI(apiKey,inidate,enddate) {
  try {
    
    const response = await fetch(`https://admin.yeeterboards.com/api/yeet/concierge/public/affiliate/referrals/all?startDate=${inidate}&endDate=${enddate}`, {
      headers: {
        "origin": "https://yeeterboards.com",
        "referer": "https://yeeterboards.com/",
        "sec-fetch-mode": "cors",
        "sec-fetch-site": "same-site",
        "x-yeet-api-key": apiKey
      }
    });

    if (!response.ok) throw new Error("API error");

    const data = await response.json();

    return data.map(p => ({
      jugador: p.username,
      puntos: Number(p.leaderboardPoints) || 0
    }));

  } catch (error) {
    console.warn("⚠️ API falló, usando datos locales", error);
    return null;
  }
}

function loadMetaData(tableId,inidate,enddate,referral,prize,current_volume) {

  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.innerHTML = "";

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="Referral">${referral}</td>
    <td class="inidate">${formatDate(inidate)}</td>
    <td class="enddate">${formatDate(enddate)}</td>
    <td class="prize">$${prize.toLocaleString()}</td>
  `;

  tbody.appendChild(tr);

}

function loadInitialData(tableId, data, prizes) {

  data.sort((a,b) => b.puntos  - a.puntos);

  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.innerHTML = "";

  data.forEach((row,index) => {
    const prize = prizes[index] ?? 0;
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="pos">${index + 1}</td>
      <td class="creator">${row.jugador}</td>
      <td><input disabled type="text" value="${row.puntos.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
            })}"></td>
      <td class="prize">$${prize.toLocaleString()}</td>
    `;

    tbody.appendChild(tr);
  });
}

(async () => {
  let apiKey, inidate,enddate,prizes;
  const apiMetaData = await fetchMetaDataFromAPI();

  if (apiMetaData) {
    apiKey = apiMetaData.yeet_api_key;
    inidate = apiMetaData.inidate;
    enddate = apiMetaData.enddate;
    prizes = apiMetaData.prize_array;
    referral = 
    loadMetaData("metadata", inidate,enddate,apiMetaData.referral,apiMetaData.prize,apiMetaData.current_volume);
  } else {
    apiKey = sessionStorage.getItem("yeet_api_key");
    inidate = sessionStorage.getItem("yeet_api_inidate");
    enddate = sessionStorage.getItem("yeet_api_enddate");
    prizes = [];
  }

  const apiData = await fetchFromAPI(apiKey,inidate,enddate);

  if (apiData && apiData.length) {
    loadInitialData("summary", apiData, prizes);
  }

})();

sessionStorage.removeItem("yeet_api_key");
sessionStorage.removeItem("yeet_api_inidate");
sessionStorage.removeItem("yeet_api_enddate");

</script>
</div>
</body>
</html>
